version: '3.8'

# Local backend-only development stack.
# This starts the API and a local PostgreSQL container. Supabase Auth/Storage
# must still be available — either via `npx supabase start` (recommended) or a
# dedicated free-tier Supabase project. Copy .env.development.example to
# .env.development and adjust the Supabase URL/key before running.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.development
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ata_lta_erp
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro
    command: ["npm", "run", "dev"]

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ata_lta_erp
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ata_lta_erp"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
