# ATA & LTA ERP — Render Blueprint
# Declares UAT and Production services for auto-deploy from Git branches.

services:
  # ─── UAT Backend ────────────────────────────────────────────────
  - type: web
    name: ata-lta-erp-api-uat
    runtime: docker
    repo: https://github.com/jevvii/ata-lta-erp-final-render.git
    branch: uat
    rootDir: backend
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: FRONTEND_URL
        fromService:
          name: ata-lta-erp-spa-uat
          type: web
          property: host
      - fromGroup: erp-uat-secrets

  # ─── UAT Frontend Static Site ──────────────────────────────────
  - type: web
    name: ata-lta-erp-spa-uat
    runtime: static
    repo: https://github.com/jevvii/ata-lta-erp-final-render.git
    branch: uat
    rootDir: erp_prototype
    buildCommand: npm run build
    staticPublishPath: .
    envVars:
      - key: ERP_API_BASE_URL
        fromService:
          name: ata-lta-erp-api-uat
          type: web
          property: host

  # ─── Production Backend ────────────────────────────────────────
  - type: web
    name: ata-lta-erp-api-prod
    runtime: docker
    repo: https://github.com/jevvii/ata-lta-erp-final-render.git
    branch: main
    rootDir: backend
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: FRONTEND_URL
        fromService:
          name: ata-lta-erp-spa-prod
          type: web
          property: host
      - fromGroup: erp-prod-secrets

  # ─── Production Frontend Static Site ───────────────────────────
  - type: web
    name: ata-lta-erp-spa-prod
    runtime: static
    repo: https://github.com/jevvii/ata-lta-erp-final-render.git
    branch: main
    rootDir: erp_prototype
    buildCommand: npm run build
    staticPublishPath: .
    envVars:
      - key: ERP_API_BASE_URL
        fromService:
          name: ata-lta-erp-api-prod
          type: web
          property: host
