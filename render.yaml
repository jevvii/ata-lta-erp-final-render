# ATA & LTA ERP — Render Blueprint (Free Tier UAT Only)
# Deploys the UAT backend and SPA on Render's free plan.
# IMPORTANT: Replace the placeholder values in erp-uat-secrets after the
# Blueprint creates the environment group, or set them here only if this file
# will never be committed with real secrets.

projects:
  - name: My project
    environments:
      - name: uat
        services:
          # ─── UAT Backend ────────────────────────────────────────────────
          - type: web
            name: ata-lta-erp-api-uat
            runtime: docker
            plan: free
            repo: https://github.com/jevvii/ata-lta-erp-final-render.git
            branch: uat
            rootDir: backend
            dockerfilePath: Dockerfile
            healthCheckPath: /health
            envVars:
              - key: NODE_ENV
                value: production
              - key: LOG_LEVEL
                value: info
              - key: FRONTEND_URL
                fromService:
                  name: ata-lta-erp-spa-uat
                  type: web
                  property: host
              - fromGroup: erp-uat-secrets

          # ─── UAT Frontend Static Site ──────────────────────────────────
          # Static sites on Render are free by default; do not set `plan`.
          - type: web
            name: ata-lta-erp-spa-uat
            runtime: static
            repo: https://github.com/jevvii/ata-lta-erp-final-render.git
            branch: uat
            rootDir: erp_prototype
            buildCommand: npm run build
            staticPublishPath: .
            envVars:
              - key: ERP_API_BASE_URL
                fromService:
                  name: ata-lta-erp-api-uat
                  type: web
                  property: host

        envVarGroups:
          - name: erp-uat-secrets
            envVars:
              - key: SUPABASE_URL
                value: https://nohelmujoswmmqedgern.supabase.co
