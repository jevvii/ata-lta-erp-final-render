# ATA & LTA ERP — Render Blueprint (Free Tier UAT Only)
# Deploys the UAT backend and SPA into the existing "My project".
#
# PREREQUISITE: Create the "erp-uat-secrets" environment group in the Render
# dashboard under My project → uat, using these exact key names (no UAT_ prefix):
#   SUPABASE_URL
#   SUPABASE_SERVICE_KEY
#   SUPABASE_STORAGE_BUCKET
#   DATABASE_URL
# Do NOT store real secret values in this file.

projects:
  - name: My project
    environments:
      - name: uat
        services:
          # ─── UAT Backend ────────────────────────────────────────────────
          - type: web
            name: ata-lta-erp-api-uat
            runtime: docker
            plan: free
            repo: https://github.com/jevvii/ata-lta-erp-final-render.git
            branch: uat
            rootDir: backend
            dockerfilePath: Dockerfile
            healthCheckPath: /health
            envVars:
              - key: NODE_ENV
                value: production
              - key: LOG_LEVEL
                value: info
              - key: FRONTEND_URL
                fromService:
                  name: ata-lta-erp-spa-uat
                  type: web
                  property: host
              - fromGroup: erp-uat-secrets

          # ─── UAT Frontend Static Site ──────────────────────────────────
          # Static sites on Render are free by default; do not set `plan`.
          - type: web
            name: ata-lta-erp-spa-uat
            runtime: static
            repo: https://github.com/jevvii/ata-lta-erp-final-render.git
            branch: uat
            rootDir: erp_prototype
            buildCommand: npm run build
            staticPublishPath: .
            envVars:
              - key: ERP_API_BASE_URL
                fromService:
                  name: ata-lta-erp-api-uat
                  type: web
                  property: host
